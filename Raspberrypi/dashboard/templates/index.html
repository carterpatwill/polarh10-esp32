<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Polar H10 — Sessions</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --line: #30363d;
    --text: #e6edf3; --muted: #8b949e; --blue: #58a6ff;
    --red: #f85149; --green: #3fb950; --amber: #d29922;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 16px; max-width: 1100px; margin: 0 auto;
  }
  a { color: var(--blue); text-decoration: none; }
  h1 { font-size: 20px; margin: 0 0 16px; font-weight: 600; }
  h1 .sub { color: var(--muted); font-weight: 400; font-size: 13px; }
  .hidden { display: none !important; }

  /* ---- session list ---- */
  .date-group { margin-bottom: 22px; }
  .date-head { color: var(--muted); font-size: 12px; text-transform: uppercase;
               letter-spacing: .6px; margin: 0 0 8px; font-weight: 600; }
  .session {
    display: flex; align-items: center; gap: 14px; cursor: pointer;
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 16px; margin-bottom: 8px; transition: border-color .12s, background .12s;
  }
  .session:hover { border-color: var(--blue); background: #1a2233; }
  .session .label { font-size: 16px; font-weight: 600; }
  .session .when { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .session .grow { flex: 1; }
  .session .metrics { display: flex; gap: 18px; text-align: right; }
  .session .metric .v { font-size: 15px; font-weight: 700; }
  .session .metric .k { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; }
  .session .chev { color: var(--muted); font-size: 20px; }
  .empty { color: var(--muted); padding: 40px 0; text-align: center; }

  /* ---- detail ---- */
  .back { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 14px;
          font-size: 14px; cursor: pointer; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; }
  .card .k { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  .card .v { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .chart-wrap { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px; margin-bottom: 16px; }
  .chart-wrap h2 { font-size: 13px; margin: 0 0 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .chart-box { position: relative; height: 260px; }
</style>
</head>
<body>

  <!-- ============ LIST VIEW ============ -->
  <section id="listView">
    <h1>Sessions <span class="sub">— Polar H10 workouts on the Pi</span></h1>
    <div id="sessionList"><div class="empty">Loading…</div></div>
  </section>

  <!-- ============ DETAIL VIEW ============ -->
  <section id="detailView" class="hidden">
    <span class="back" onclick="location.hash=''">&larr; All sessions</span>
    <h1 id="dTitle">Session</h1>
    <div class="cards">
      <div class="card"><div class="k">Duration</div><div class="v" id="dDur">–</div></div>
      <div class="card"><div class="k">Avg BPM</div><div class="v" id="dAvg">–</div></div>
      <div class="card"><div class="k">Min BPM</div><div class="v" id="dMin">–</div></div>
      <div class="card"><div class="k">Max BPM</div><div class="v" id="dMax">–</div></div>
      <div class="card"><div class="k">HR samples</div><div class="v" id="dHr">–</div></div>
      <div class="card"><div class="k">Acc samples</div><div class="v" id="dAcc">–</div></div>
    </div>
    <div class="chart-wrap">
      <h2>Heart rate (BPM)</h2>
      <div class="chart-box"><canvas id="hrChart"></canvas></div>
    </div>
    <div class="chart-wrap">
      <h2>Accelerometer (milli-g)</h2>
      <div class="chart-box"><canvas id="accChart"></canvas></div>
    </div>
  </section>

<script>
const GRID = "rgba(139,148,158,.15)";
Chart.defaults.color = "#8b949e";
Chart.defaults.font.size = 11;

// ---------- helpers ----------
function fmtDur(s) {
  if (s == null) return "–";
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  return (h ? h+"h " : "") + (m ? m+"m " : "") + sec + "s";
}
function fmtElapsed(sec) {
  sec = Math.round(sec);
  const m = Math.floor(sec/60), s = sec%60;
  return m + ":" + String(s).padStart(2, "0");
}
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString([], { weekday:"short", month:"short", day:"numeric", year:"numeric" });
}
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
}
function dayKey(iso) { return iso.slice(0, 10); }  // YYYY-MM-DD

// ---------- list view ----------
async function loadList() {
  const box = document.getElementById("sessionList");
  let sessions;
  try {
    sessions = await fetch("/api/sessions").then(r => r.json());
  } catch (e) {
    box.innerHTML = `<div class="empty">Couldn't load sessions: ${e.message}</div>`;
    return;
  }
  if (!sessions.length) {
    box.innerHTML = `<div class="empty">No recorded sessions yet.</div>`;
    return;
  }
  // group by calendar day (already sorted newest-first by the API)
  const groups = {};
  for (const s of sessions) (groups[dayKey(s.started)] ??= []).push(s);

  box.innerHTML = Object.entries(groups).map(([day, items]) => `
    <div class="date-group">
      <div class="date-head">${fmtDate(day)}</div>
      ${items.map(s => `
        <div class="session" onclick="location.hash='#/session/${s.id}'">
          <div class="grow">
            <div class="label">${s.label ? escapeHtml(s.label) : "Session #" + s.id}</div>
            <div class="when">${fmtTime(s.started)} · ${fmtDur(s.duration_s)}</div>
          </div>
          <div class="metrics">
            <div class="metric"><div class="v">${s.hr_count.toLocaleString()}</div><div class="k">HR</div></div>
            <div class="metric"><div class="v">${s.acc_count.toLocaleString()}</div><div class="k">Acc</div></div>
          </div>
          <span class="chev">›</span>
        </div>`).join("")}
    </div>`).join("");
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

// ---------- detail view ----------
let hrChart, accChart;

function mkChart(id, datasets, yTitle) {
  return new Chart(document.getElementById(id), {
    type: "line",
    data: { datasets },
    options: {
      animation: false, parsing: false, normalized: true,
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: "nearest", axis: "x", intersect: false },
      elements: { point: { radius: 0 }, line: { borderWidth: 1.5, tension: .2 } },
      scales: {
        x: { type: "linear", grid: { color: GRID },
             ticks: { callback: v => fmtElapsed(v) },
             title: { display: true, text: "elapsed (min:sec)" } },
        y: { grid: { color: GRID }, title: { display: !!yTitle, text: yTitle } }
      },
      plugins: {
        legend: { display: datasets.length > 1, labels: { boxWidth: 12 } },
        tooltip: { callbacks: { title: items => fmtElapsed(items[0].parsed.x) } }
      }
    }
  });
}

async function loadDetail(sid) {
  const d = await fetch("/api/session/" + sid).then(r => r.json());
  if (d.error) { document.getElementById("dTitle").textContent = "Session not found"; return; }

  document.getElementById("dTitle").textContent =
    (d.label || "Session #" + d.id) + "  ·  " + fmtDate(d.started) + " " + fmtTime(d.started);
  const st = d.stats || {};
  document.getElementById("dDur").textContent = fmtDur(d.duration_s);
  document.getElementById("dAvg").textContent = st.avg ?? "–";
  document.getElementById("dMin").textContent = st.min ?? "–";
  document.getElementById("dMax").textContent = st.max ?? "–";
  document.getElementById("dHr").textContent  = (d.hr_total ?? 0).toLocaleString();
  document.getElementById("dAcc").textContent = (d.acc_total ?? 0).toLocaleString();

  const hrData = d.hr.map(r => ({ x: r.t, y: r.bpm }));
  const ax = d.acc.map(r => ({ x: r.t, y: r.x }));
  const ay = d.acc.map(r => ({ x: r.t, y: r.y }));
  const az = d.acc.map(r => ({ x: r.t, y: r.z }));

  hrChart?.destroy();
  accChart?.destroy();
  hrChart = mkChart("hrChart", [
    { label: "BPM", data: hrData, borderColor: "#f85149", fill: true,
      backgroundColor: "rgba(248,81,73,.08)" }
  ], "BPM");
  accChart = mkChart("accChart", [
    { label: "X", data: ax, borderColor: "#58a6ff" },
    { label: "Y", data: ay, borderColor: "#3fb950" },
    { label: "Z", data: az, borderColor: "#d29922" },
  ], "milli-g");
}

// ---------- tiny hash router ----------
function route() {
  const m = location.hash.match(/^#\/session\/(\d+)$/);
  const list = document.getElementById("listView");
  const detail = document.getElementById("detailView");
  if (m) {
    list.classList.add("hidden");
    detail.classList.remove("hidden");
    window.scrollTo(0, 0);
    loadDetail(m[1]);
  } else {
    detail.classList.add("hidden");
    list.classList.remove("hidden");
    loadList();
  }
}

window.addEventListener("hashchange", route);
route();
</script>
</body>
</html>
